<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BR Studio | Login</title>
    <style>

body{
    margin:0;
    padding:0;
    background:#0d1117;
    color:white;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:#161b22;
    padding:35px;
    width:320px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 30px rgba(0,0,0,.5);
}

h1{
    margin-bottom:10px;
}

p{
    color:#b3b3b3;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#21262d;
    color:white;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#238636;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#2ea043;
}

    </style>
</head>

<body>
<div class="container">

    <h1>🚀 BR Studio</h1>

    <p1>Welcome to BR Studio.</p1>

    <p>Where every journey begins with an idea.</p>

    <input type="email" placeholder="Email">

    <input type="password" placeholder="Password">

    <button onclick="window.location.href='dashboard.html'">
    ENTER
    </button>

</div>
</body>
</html>
